version: '3.8'

services:
  lumi-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8765:8765"
    volumes:
      - ./outputs:/app/outputs
      - ./owner_voices:/app/owner_voices
      # Chia sẻ cache của HuggingFace để không phải tải lại model
      - ~/.cache/huggingface:/root/.cache/huggingface 
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  lumi-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8880:80"
    depends_on:
      - lumi-backend
