server {
    listen 80;
    server_name _; # Sẽ nhận mọi domain trỏ về IP này
    client_max_body_size 25m;

    # Phục vụ file tĩnh của Frontend React/Vite
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy các request /api/ tới Backend
    location /api/ {
        proxy_pass http://lumi-backend:8765/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Proxy các request /outputs/ (file audio) tới Backend
    location /outputs/ {
        proxy_pass http://lumi-backend:8765/outputs/;
        proxy_set_header Host $host;
    }
}
